# ══════════════════════════════════════════════════════════════
# PROJECT 1: Dynamic GitHub Profile README Updater
# Skills: schedule, workflow_dispatch inputs, concurrency,
#         matrix, needs, artifacts, REST API, if conditions,
#         reusable workflow, custom action
# ══════════════════════════════════════════════════════════════
name: 🌟 Dynamic Profile README Updater

on:
  schedule:
    - cron: "0 6 * * *"            # Daily at 6 AM UTC
  workflow_dispatch:
    inputs:
      include_ascii:
        description: "Include ASCII art banner?"
        type: boolean
        default: true
      theme:
        description: "README theme"
        type: choice
        options: [dark, light, colorful]
        default: dark

concurrency:
  group: profile-update
  cancel-in-progress: true

env:
  GITHUB_USERNAME: ${{ github.actor }}

jobs:
  # ── Job 1: Fetch live data via REST API ────────────────────────
  fetch-data:
    name: 📊 Fetch GitHub Stats
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      commit_count: ${{ steps.stats.outputs.commits }}
      last_updated: ${{ steps.stats.outputs.date }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📡 Fetch Stats via REST API
        id: stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date '+%Y-%m-%d %H:%M UTC')
          echo "date=$DATE" >> $GITHUB_OUTPUT
          COMMITS=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/commits?per_page=1" \
            | python3 -c "import sys,json; data=json.load(sys.stdin); print(len(data) if isinstance(data,list) else 0)")
          echo "commits=$COMMITS" >> $GITHUB_OUTPUT
          mkdir -p stats
          echo "Last Updated: $DATE" > stats/stats.txt
          echo "Recent Commits: $COMMITS" >> stats/stats.txt
          echo "Actor: ${{ github.actor }}" >> stats/stats.txt

      - name: 📦 Save Stats Artifact
        uses: actions/upload-artifact@v4
        with:
          name: profile-stats
          path: stats/
          retention-days: 1

  # ── Job 2: Generate ASCII banner (conditional) ─────────────────
  generate-ascii:
    name: 🎨 Generate ASCII Banner
    runs-on: ubuntu-latest
    needs: fetch-data
    if: inputs.include_ascii == true || github.event_name == 'schedule'
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🎨 Use Custom ASCII Banner Action
        id: banner
        uses: ./.github/actions/ascii-banner
        with:
          text: ${{ env.GITHUB_USERNAME }}
          font: slant

      - name: 📋 Show Banner Output
        run: echo "Banner generated for user $GITHUB_USERNAME"

  # ── Job 3: Update README sections via matrix ───────────────────
  update-readme:
    name: 📝 Update README — ${{ matrix.section }}
    runs-on: ubuntu-latest
    needs: [fetch-data, generate-ascii]
    strategy:
      matrix:
        section: [header, stats, footer]
      fail-fast: false
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📥 Download Stats Artifact
        uses: actions/download-artifact@v4
        with:
          name: profile-stats
          path: stats/

      - name: 📝 Update README Section — ${{ matrix.section }}
        env:
          LAST_UPDATED: ${{ needs.fetch-data.outputs.last_updated }}
          THEME: ${{ inputs.theme || 'dark' }}
        run: |
          chmod +x scripts/update-readme.sh
          ./scripts/update-readme.sh "${{ matrix.section }}" "$LAST_UPDATED" "$THEME"

  # ── Job 4: Commit and push updated README ──────────────────────
  commit-and-push:
    name: 📤 Commit & Push README
    runs-on: ubuntu-latest
    needs: update-readme
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔐 Configure Git Identity
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: 📤 Commit and Push README
        run: |
          git add README.md || true
          git diff --staged --quiet || \
            git commit -m "🤖 Auto-update profile README [skip ci]"
          git push || echo "Nothing to push"

      - name: 🔔 Notify Team on Completion
        uses: ./.github/workflows/reusable-notify.yml
        with:
          message: "Profile README updated successfully! Theme: ${{ inputs.theme || 'dark' }}"
          environment: production
        secrets:
          NOTIFY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
